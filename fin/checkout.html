<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10 шагов к финансовой свободе — Purchase | Fin Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: #fff;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: radial-gradient(ellipse at 50% 30%, rgba(201,169,89,0.06) 0%, transparent 60%);
    }
    :root {
      --gold: #C9A959;
      --gold-light: #e0c87a;
      --bg2: #0a0a0a;
      --bg3: #111;
      --text-muted: #999;
      --border: rgba(255,255,255,0.08);
    }

    .card {
      max-width: 520px;
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
    }

    .badge {
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 20px;
      border: 1px solid rgba(201,169,89,0.3);
      display: inline-block;
      padding: 6px 16px;
      border-radius: 4px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      margin-bottom: 8px;
    }
    h1 span { color: var(--gold); }

    .subtitle {
      color: var(--text-muted);
      font-size: 15px;
      margin-bottom: 32px;
    }

    .price {
      font-size: 56px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 4px;
    }
    .price-label {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .features {
      list-style: none;
      text-align: left;
      margin-bottom: 32px;
    }
    .features li {
      padding: 10px 0;
      font-size: 14px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .features li:last-child { border-bottom: none; }
    .features li::before {
      content: "✓";
      color: var(--gold);
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
    }

    #checkout-button {
      width: 100%;
      background: var(--gold);
      color: #000;
      border: none;
      padding: 18px 32px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }
    #checkout-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(201,169,89,0.3);
    }
    #checkout-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    #checkout-button.loading {
      position: relative;
      color: transparent;
    }
    #checkout-button.loading::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      top: 50%;
      left: 50%;
      margin: -10px 0 0 -10px;
      border: 3px solid rgba(0,0,0,0.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .secure {
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .secure svg { flex-shrink: 0; }

    .back-link {
      margin-top: 24px;
      font-size: 13px;
    }
    .back-link a { color: var(--gold); text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }

    .error-msg {
      background: rgba(255,59,48,0.1);
      border: 1px solid rgba(255,59,48,0.3);
      color: #ff3b30;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      display: none;
    }

    @media (max-width: 480px) {
      .card { padding: 32px 20px; }
      h1 { font-size: 24px; }
      .price { font-size: 42px; }
    }
  </style>
</head>
<body><div class="container">
    <div class="card">
        <div class="price-label">Один платёж — доступ навсегда</div>
        <div class="price">990 ₽</div>
        
        <div style="background:#f8f5f0;padding:24px;border-radius:12px;margin:20px 0;text-align:left;">
            <div style="font-size:14px;color:#666;margin-bottom:8px;">ДЛЯ ОПЛАТЫ ПЕРЕВЕДИТЕ</div>
            <div style="font-size:16px;font-weight:600;margin-bottom:4px;">990 ₽ по номеру телефона</div>
            <div style="font-size:24px;font-weight:700;color:#1a1a2e;margin-bottom:16px;letter-spacing:2px;">+7 978 052-50-45</div>
            <div style="font-size:12px;color:#888;">СБП • Т-Банк • Сбер • любой банк</div>
        </div>
        
        <div style="background:#e8b830;color:#000;padding:14px;border-radius:8px;font-weight:600;font-size:14px;margin:20px 0;">
            ⚡ После оплаты гайд придёт на почту в течение 5 минут
        </div>
        
        <a href="https://arsenbekirov.com/fin/guide.html" style="display:block;padding:18px;background:linear-gradient(135deg,#e8b830,#c9a020);color:#000;text-align:center;border-radius:12px;font-weight:700;font-size:18px;text-decoration:none;">
            💰 Уже оплатил — открыть гайд
        </a>
        
        <div style="margin-top:24px;font-size:12px;color:#666;text-align:center;">
            Есть вопросы? Напишите в Telegram: @NikosKworkAssistantBot
        </div>
    </div>
</div></body>
</html>
